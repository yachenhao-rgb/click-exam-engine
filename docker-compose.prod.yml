# ============================================
# 智能出题引擎 Web版 - 生产环境Docker Compose
# ============================================
# 使用方法:
#   docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-exam-engine
    restart: always
    ports:
      - "127.0.0.1:5000:5000"  # 仅本地监听，Nginx做反向代理
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - USE_AI=true
      - AI_PROVIDER=deepseek
      - AI_MODEL=deepseek-chat
      - API_BASE_URL=https://api.deepseek.com/v1
      - FLASK_ENV=production
      - LOG_LEVEL=INFO
    volumes:
      - exam-data:/app/data
      - exam-output:/app/output
      - exam-logs:/app/logs
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Nginx反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: smart-exam-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  exam-data:
    driver: local
  exam-output:
    driver: local
  exam-logs:
    driver: local
